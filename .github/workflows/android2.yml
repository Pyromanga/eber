# .github/workflows/build.yml
name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # Android SDK ist auf ubuntu-24.04 bereits vorinstalliert
      # Aber local.properties muss explizit gesetzt werden
      - name: Create local.properties
        working-directory: android
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      # gradlew generieren falls nicht im Repo
      - name: Setup Gradle Wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions@v5
        with:
          gradle-version: wrapper   # ← wrapper statt 8.4 !

      - name: Build Debug APK
        working-directory: android  # ← das war wahrscheinlich das Kernproblem
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk